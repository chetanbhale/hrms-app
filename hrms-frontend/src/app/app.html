<div style="display:flex; justify-content: space-between; padding:10px; background:#eee">

  <div>
    <b>HRMS App</b>
  </div>

  <div>

    @if(user().role === 'SUPER_ADMIN') {
      <button (click)="goToClients()">Clients</button>
      <button (click)="addClient()">Add Client</button>
    }

    @if(
      user().role === 'SUPER_ADMIN' ||
      user().role === 'CLIENT_ADMIN'
    ) {
      <button (click)="goToUsers()">Users</button>
      <button (click)="addUsers()">Add Users</button>
    }

    <button (click)="logout()">Logout</button>

  </div>

</div>

<router-outlet></router-outlet>
